repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # 10MB threshold to catch large assets early while still allowing reasonable binaries
        args: ['--maxkb=10240']
        # Exclude known/legitimate large-file locations; adjust paths to your repo layout
        exclude: >
          (^docs/assets/)|
          (^tests/data/)|
          (^fixtures/)|
          (^snapshots/)

  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-all-unused-imports

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3.11
